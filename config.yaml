# Logging level ('DEBUG', 'INFO', 'WARNING', 'ERROR' or 'CRITICAL')
log_level: 'INFO'

# SPDX JSON license list URL
licenses: 'licenses.json'  # yamllint disable-line rule:line-length

# Hugo sources directory
source: './src/hugo'

# Projects to include in the OHWR website.
projects:
    # URL to the Git repository of the project.
    # The Git repository must contain a .ohwr.yaml file.
  - repo: 'https://github.com/vascoguita/svec.git'
    # (optional) Show project as featured.
    featured: true
  - repo: 'https://github.com/vascoguita/spec.git'
    featured: true
  - repo: 'https://github.com/vascoguita/fmc-tdc.git'
  - repo: 'https://github.com/vascoguita/fmc-delay-1ns-8cha.git'
  - repo: 'https://github.com/vascoguita/fmc-adc-100m14b4cha.git'

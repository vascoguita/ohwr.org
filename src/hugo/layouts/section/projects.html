{{ partial "page-header.html" . }}
{{ range .Site.Taxonomies.categories }}
      <option value="{{ .Page.Name }}">{{ .Page.Title }}</option>
      {{ end }}
<section class="section">
  <div class="container">
    <div class="mb-5">{{ partial "search.html" }}</div>
    <div class="row">
      {{ range (.Paginate .Data.Pages).Pages }}
      {{ partial "vertical-card.html" . }}
      {{ end }}
      <div class="col-12">
        {{ template "_internal/pagination.html" . }}
      </div>
    </div>
  </div>
</section>

{{ end }}

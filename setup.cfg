[flake8]
exclude =
  .git/
  __pycache__/
  .venv/
per-file-ignores =
  test/*.py: S101, WPS202, WPS441, WPS432, P103, WPS226, WPS609, WPS442, WPS204,
    F401, F811

[isort]
multi_line_output = 3
include_trailing_comma = true
use_parentheses = true
